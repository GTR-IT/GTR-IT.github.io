<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GTR IT — Less Grind. More Growth. AI agents and workflow automation for SMEs. Transform your business with intelligent automation solutions.">
    <meta name="theme-color" content="#202124">
    <meta name="color-scheme" content="light">
    <title>GTR IT — Less Grind. More Growth.</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #4285F4;
            --color-secondary: #EA4335;
            --color-tertiary: #FBBC05;
            --color-charcoal: #202124;
            --color-slate: #3C4043;
            --color-cloud: #F8F9FA;
            --color-background: #ffffff;
            --color-text-dark: #202124;
            --color-text-light: #3C4043;
            --color-border: #e5e7eb;
            --color-white: #ffffff;
            
            --spacing-xs: 0.5rem;
            --spacing-sm: 1rem;
            --spacing-md: 1.5rem;
            --spacing-lg: 2rem;
            --spacing-xl: 3rem;
            --spacing-2xl: 4rem;
            
            --font-family: 'Poppins', -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue', sans-serif;
            --font-mono: 'Monaco', 'Courier New', monospace;
            
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            
            --transition: all 0.3s ease-in-out;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: var(--font-family);
            color: var(--color-text-dark);
            background-color: var(--color-white);
            line-height: 1.6;
        }

        /* Typography */
        h1, h2, h3, h4, h5, h6 {
            font-weight: 600;
            line-height: 1.2;
            margin-bottom: var(--spacing-md);
            color: var(--color-charcoal);
        }

        h1 {
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 800;
        }

        h2 {
            font-size: clamp(1.75rem, 4vw, 2.5rem);
            font-weight: 600;
        }

        h3 {
            font-size: clamp(1.5rem, 3.5vw, 1.875rem);
            font-weight: 600;
        }

        p {
            margin-bottom: var(--spacing-md);
            font-size: 1rem;
            color: var(--color-text-light);
            font-weight: 400;
        }

        a {
            color: var(--color-primary);
            text-decoration: none;
            transition: var(--transition);
        }

        a:hover {
            color: #1967d2;
        }

        /* Container & Layout */
        .container {
            width: 100%;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--spacing-md);
        }

        /* Header & Navigation */
        header {
            background: var(--color-white);
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 1000;
            border-bottom: 1px solid var(--color-border);
        }

        nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--spacing-md) 0;
        }

        .logo {
            font-size: 4.2rem;
            font-weight: 800;
            color: var(--color-charcoal);
            letter-spacing: -0.03em;
            display: flex;
            gap: 0;
            line-height: 1;
        }

        .footer-logo {
            font-size: 3.3rem;
            font-weight: 800;
            letter-spacing: -0.03em;
            display: inline-flex;
            gap: 0;
            line-height: 1;
            margin-bottom: 0.5rem;
        }
